<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  {%- include head.html -%}
  <body>
    {%- include header.html -%}
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>
    {%- include footer.html -%}
    <div style="text-align: center; padding: 10px; font-size: 0.8em; color: #828282;">
      Licensed under <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>
    </div>
    <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      }
    };
    </script>
    <script src="/assets/js/tex-chtml.js"></script>
  </body>
</html>
